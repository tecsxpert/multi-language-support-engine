services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: multilanguage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  ai-service:
    build: ./ai-service
    container_name: ai-service
    ports:
      - "5000:5000"

